
<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Velatra - SaaS Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=JetBrains+Mono&display=swap');
      
      :root {
        --natif-red: #c41e3a;
        --natif-red-dark: #8b1528;
      }

      body {
        background-color: #050505;
        color: #ffffff;
        font-family: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
        margin: 0;
        -webkit-tap-highlight-color: transparent;
        overflow-x: hidden;
      }

      .premium-gradient {
        background: linear-gradient(135deg, #1a1a1a 0%, #0a0a0a 100%);
      }

      .glass {
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.08);
      }

      .glass-card {
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.05) 0%, rgba(255, 255, 255, 0.01) 100%);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
      }

      .font-mono-timer {
        font-family: 'JetBrains Mono', monospace;
      }

      /* Transitions */
      .page-transition {
        animation: fadeIn 0.4s ease-out;
      }

      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }

      /* Custom scrollbar */
      ::-webkit-scrollbar {
        width: 4px;
      }
      ::-webkit-scrollbar-track {
        background: #050505;
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(196, 30, 58, 0.3);
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #c41e3a;
      }

      /* Active scaling for buttons */
      button:active {
        transform: scale(0.96);
      }
    </style>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              natif: {
                bg: '#050505',
                bgLight: '#0d0d0d',
                bgCard: '#141414',
                border: '#222222',
                accent: '#c41e3a',
                accentDark: '#8b1528',
                textMuted: '#a1a1a1',
                textDark: '#525252',
                success: '#10b981',
                warning: '#f59e0b',
                blue: '#3b82f6',
                pink: '#ec4899',
                purple: '#a855f7',
                orange: '#f97316',
                coaching: '#ef4444'
              }
            }
          }
        }
      }
    </script>

}
</script>

</head>

</body>
</html>
